name: Bug Report
description: 报告一个问题，帮助我们定位和修复错误
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢提交问题。请尽量提供可复现的信息，方便快速定位。

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明你遇到了什么问题，以及实际表现是什么。
      placeholder: 例如：打开某个工具页面后，点击按钮没有任何响应。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序描述如何稳定复现这个问题。
      placeholder: |
        1. 进入 ...
        2. 点击 ...
        3. 输入 ...
        4. 出现问题 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      description: 说明你原本预期应该发生什么。
      placeholder: 例如：应当正常保存并刷新预览内容。
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请填写尽可能完整的运行环境信息。
      placeholder: |
        - OS:
        - Browser:
        - Node.js:
        - Package manager:
        - Project version / commit:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图 / 补充信息
      description: 可粘贴报错、控制台输出，或附上截图。
      placeholder: 可选，但强烈建议提供。
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issues，确认这不是重复问题
          required: true
        - label: 我已尽量提供了可复现步骤和必要信息
          required: true
