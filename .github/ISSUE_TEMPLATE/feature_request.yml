name: Feature Request
description: 提交功能建议或改进想法
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢提出建议。请尽量说明场景、目标和预期收益，方便评估优先级。

  - type: textarea
    id: summary
    attributes:
      label: 功能概述
      description: 简要描述你希望新增或改进的能力。
      placeholder: 例如：希望 Markdown 编辑器支持文件重命名快捷键。
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 说明当前有哪些痛点，为什么现有方案不够用。
      placeholder: 例如：当前只能通过右键菜单操作，键盘工作流不够顺畅。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你理想中的实现方式或交互方式。
      placeholder: 例如：选中文件后按 F2 进入重命名状态。
    validations:
      required: true

  - type: textarea
    id: use_cases
    attributes:
      label: 使用场景
      description: 说明这个功能在什么场景下会被使用，以及它带来的价值。
      placeholder: |
        - 当用户需要高频编辑多个文件时 ...
        - 当页面内容较复杂时 ...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 你的优先级判断
      description: 你认为这个需求的重要程度如何。
      options:
        - 高
        - 中
        - 低
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 参考资料 / 设计稿 / 补充说明
      description: 可附上参考链接、截图、竞品行为或其他背景信息。
      placeholder: 可选。

  - type: checkboxes
    id: confirm
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issues，确认这不是重复需求
          required: true
        - label: 我提供的需求描述足够明确，便于后续评估
          required: true
